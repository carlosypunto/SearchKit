# CI for SearchKit.
#
# Runs build + tests on macOS. The Benchmark suite is opt-in/slow and the
# RealEmbedding suite needs NLContextualEmbedding model assets downloaded
# on-device, so neither runs in CI (same skip flags as local iteration).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build
        run: swift build

      - name: Test
        run: swift test --skip Benchmark --skip RealEmbedding
